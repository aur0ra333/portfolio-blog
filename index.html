<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人博客系统</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="animated-bg">
        <div class="gradient-orb orb-1"></div>
        <div class="gradient-orb orb-2"></div>
        <div class="gradient-orb orb-3"></div>
    </div>

    <header class="blog-header glass">
        <nav class="nav-container">
            <div class="logo">
                <h1>📝 我的博客</h1>
            </div>
            <div class="nav-right">
                <div class="search-box">
                    <input type="text" id="search-input" placeholder="搜索文章..." />
                    <button class="search-btn" onclick="searchPosts()">🔍</button>
                </div>
                <button class="theme-toggle" id="theme-toggle" title="切换主题">
                    <span class="icon">🌙</span>
                </button>
                <ul class="nav-links">
                    <li><a href="#" class="active" data-page="home">首页</a></li>
                    <li><a href="#" data-page="articles">文章</a></li>
                    <li><a href="#" data-page="about">关于</a></li>
                    <li><a href="#" data-page="contact">联系</a></li>
                </ul>
            </div>
        </nav>
    </header>

    <main class="container">
        <div class="content-wrapper">
            <section class="blog-posts">
                <article class="post-card featured glass-card">
                    <div class="post-image">
                        <div class="placeholder-image">🚀</div>
                    </div>
                    <div class="post-content">
                        <div class="post-meta">
                            <span class="post-category">技术</span>
                            <span class="post-date">2026-03-22</span>
                        </div>
                        <h2 class="post-title">如何高效学习编程：我的 5 年经验分享</h2>
                        <p class="post-excerpt">
                            学习编程是一条充满挑战但也充满乐趣的道路。在这篇文章中，我将分享我 5 年编程学习生涯中总结出的宝贵经验...
                        </p>
                        <div class="post-footer">
                            <div class="author-info">
                                <div class="author-avatar">A</div>
                                <span>作者</span>
                            </div>
                            <button class="btn-read-more" onclick="openArticle(0)">阅读更多 →</button>
                        </div>
                    </div>
                </article>

                <div class="posts-grid" id="posts-container">
                </div>

                <div class="pagination">
                    <button class="btn-page active">1</button>
                    <button class="btn-page">2</button>
                    <button class="btn-page">3</button>
                    <button class="btn-page">下一页 →</button>
                </div>
            </section>

            <aside class="sidebar">
                <div class="widget glass-card">
                    <h3>关于我</h3>
                    <div class="about-widget">
                        <div class="about-avatar">👨‍💻</div>
                        <p>热爱编程的全栈开发者，专注于 Web 开发和用户体验设计。</p>
                    </div>
                </div>

                <div class="widget glass-card">
                    <h3>分类目录</h3>
                    <ul class="category-list" id="category-list">
                    </ul>
                </div>

                <div class="widget glass-card">
                    <h3>热门标签</h3>
                    <div class="tag-cloud" id="tag-cloud">
                    </div>
                </div>

                <div class="widget glass-card">
                    <h3>订阅更新</h3>
                    <form class="subscribe-form" onsubmit="subscribe(event)">
                        <input type="email" placeholder="输入邮箱地址" required />
                        <button type="submit">订阅</button>
                    </form>
                </div>
            </aside>
        </div>
    </main>

    <article-modal id="article-modal" style="display: none;">
        <div class="modal-content glass-card">
            <button class="modal-close" onclick="closeArticle()">×</button>
            <div class="modal-body" id="modal-body">
            </div>
        </div>
    </article-modal>

    <footer class="blog-footer glass">
        <div class="container">
            <p>&copy; 2026 我的博客。All rights reserved.</p>
        </div>
    </footer>

    <script src="app.js"></script>
</body>
</html>
